<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新規登録 - プレミアムマーケット</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container auth-container--wide">
            <div class="auth-header">
                <a href="index.html" class="auth-logo">
                    <span class="logo-text">プレミアムマーケット</span>
                </a>
                <h1 class="auth-title">新規会員登録</h1>
                <p class="auth-subtitle">初月無料でプレミアム体験を始めましょう</p>
            </div>

            <form class="auth-form" id="registerForm">
                <!-- プラン選択 -->
                <div class="form-section">
                    <h3 class="form-section-title">プラン選択</h3>
                    <div class="plan-selector">
                        <label class="plan-option">
                            <input type="radio" name="plan" value="standard" checked>
                            <div class="plan-option-content">
                                <div class="plan-option-header">
                                    <span class="plan-option-name">スタンダード</span>
                                    <span class="plan-option-price">¥980/月</span>
                                </div>
                                <p class="plan-option-desc">基本機能をお得に利用</p>
                            </div>
                        </label>
                        <label class="plan-option plan-option--featured">
                            <input type="radio" name="plan" value="premium">
                            <div class="plan-option-content">
                                <div class="plan-option-badge">おすすめ</div>
                                <div class="plan-option-header">
                                    <span class="plan-option-name">プレミアム</span>
                                    <span class="plan-option-price">¥1,980/月</span>
                                </div>
                                <p class="plan-option-desc">特別割引と優先サポート</p>
                            </div>
                        </label>
                        <label class="plan-option">
                            <input type="radio" name="plan" value="business">
                            <div class="plan-option-content">
                                <div class="plan-option-header">
                                    <span class="plan-option-name">ビジネス</span>
                                    <span class="plan-option-price">¥4,980/月</span>
                                </div>
                                <p class="plan-option-desc">出品者向けプラン</p>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- 基本情報 -->
                <div class="form-section">
                    <h3 class="form-section-title">基本情報</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="lastName" class="form-label">姓 <span class="required">*</span></label>
                            <input type="text" id="lastName" name="lastName" class="form-input" required placeholder="山田">
                        </div>
                        <div class="form-group">
                            <label for="firstName" class="form-label">名 <span class="required">*</span></label>
                            <input type="text" id="firstName" name="firstName" class="form-input" required placeholder="太郎">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email" class="form-label">メールアドレス <span class="required">*</span></label>
                        <input type="email" id="email" name="email" class="form-input" required placeholder="example@email.com">
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">パスワード <span class="required">*</span></label>
                        <input type="password" id="password" name="password" class="form-input" required placeholder="8文字以上の英数字">
                        <span class="form-hint">8文字以上、英字と数字を含む</span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword" class="form-label">パスワード（確認） <span class="required">*</span></label>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" required placeholder="パスワードを再入力">
                    </div>
                </div>

                <!-- お支払い情報 -->
                <div class="form-section">
                    <h3 class="form-section-title">お支払い情報</h3>
                    <div class="payment-info">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <p>お支払い情報は次のステップで安全に入力いただけます</p>
                    </div>
                    
                    <div class="form-group">
                        <label for="cardNumber" class="form-label">カード番号 <span class="required">*</span></label>
                        <input type="text" id="cardNumber" name="cardNumber" class="form-input" required placeholder="1234 5678 9012 3456" maxlength="19">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="expiry" class="form-label">有効期限 <span class="required">*</span></label>
                            <input type="text" id="expiry" name="expiry" class="form-input" required placeholder="MM/YY" maxlength="5">
                        </div>
                        <div class="form-group">
                            <label for="cvv" class="form-label">セキュリティコード <span class="required">*</span></label>
                            <input type="text" id="cvv" name="cvv" class="form-input" required placeholder="123" maxlength="4">
                        </div>
                    </div>
                </div>

                <!-- 利用規約 -->
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required>
                        <span>
                            <a href="terms.html" target="_blank" class="link-primary">利用規約</a>と
                            <a href="privacy.html" target="_blank" class="link-primary">プライバシーポリシー</a>に同意します
                        </span>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-large">登録を完了する</button>

                <p class="auth-footer">
                    すでにアカウントをお持ちの方は
                    <a href="login.html" class="link-primary">ログイン</a>
                </p>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
