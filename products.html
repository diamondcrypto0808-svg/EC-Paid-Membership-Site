<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品一覧 - プレミアムマーケット</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ヘッダー -->
    <header class="header header--logged-in">
        <div class="container">
            <div class="header__content">
                <div class="header__logo">
                    <a href="index.html">
                        <span class="logo-text">プレミアムマーケット</span>
                    </a>
                </div>
                <nav class="header__nav">
                    <ul class="nav-list">
                        <li><a href="products.html" class="active">商品一覧</a></li>
                        <li><a href="marketplace.html">マーケット</a></li>
                        <li><a href="orders.html">注文履歴</a></li>
                        <li><a href="favorites.html">お気に入り</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="marketplace">
        <div class="container">
            <div class="page-header">
                <h1 class="page-title">全商品一覧</h1>
            </div>

            <!-- カテゴリータブ -->
            <div style="margin-bottom: 3rem;">
                <div style="display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                    <button class="btn btn-outline category-tab active" data-category="all">
                        すべて
                    </button>
                    <button class="btn btn-outline category-tab" data-category="fashion">
                        👔 ファッション
                    </button>
                    <button class="btn btn-outline category-tab" data-category="electronics">
                        📱 家電・デジタル
                    </button>
                    <button class="btn btn-outline category-tab" data-category="home">
                        🏠 ホーム・インテリア
                    </button>
                    <button class="btn btn-outline category-tab" data-category="beauty">
                        💄 美容・コスメ
                    </button>
                    <button class="btn btn-outline category-tab" data-category="sports">
                        ⚽ スポーツ
                    </button>
                    <button class="btn btn-outline category-tab" data-category="food">
                        🍽️ 食品・グルメ
                    </button>
                </div>
            </div>

            <!-- 商品グリッド -->
            <div class="product-grid" id="productGrid">
                <!-- JavaScriptで動的に生成 -->
            </div>

            <!-- ページネーション -->
            <div class="pagination" id="pagination">
                <!-- JavaScriptで動的に生成 -->
            </div>
        </div>
    </main>

    <!-- フッター -->
    <footer class="footer">
        <div class="container">
            <div class="footer__content">
                <div class="footer__section">
                    <h4 class="footer__title">プレミアムマーケット</h4>
                    <p class="footer__description">
                        会員限定の特別なショッピング体験を提供するオンラインマーケットプレイスです。
                    </p>
                </div>
                <div class="footer__section">
                    <h4 class="footer__title">サービス</h4>
                    <ul class="footer__links">
                        <li><a href="products.html">商品一覧</a></li>
                        <li><a href="marketplace.html">マーケット</a></li>
                        <li><a href="seller.html">出品者向け</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer__bottom">
                <p>&copy; 2026 プレミアムマーケット. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
    <script src="js/products-data.js"></script>
    <script src="js/image-generator.js"></script>
    <script>
        // 商品表示
        let currentCategory = 'all';
        let currentPage = 1;
        const itemsPerPage = 12;

        function displayProducts() {
            const products = window.productsData.getProducts({
                category: currentCategory === 'all' ? null : currentCategory
            });

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const pageProducts = products.slice(startIndex, endIndex);

            const grid = document.getElementById('productGrid');
            grid.innerHTML = pageProducts.map(product => {
                const imageUrl = window.imageGenerator.generateProductImage(product.category, product.name);
                
                return `
                    <div class="product-card" data-product-id="${product.id}">
                        ${product.badge ? `<div class="product-card__badge ${product.badgeType === 'sale' ? 'product-card__badge--sale' : ''}">${product.badge}</div>` : ''}
                        <div class="product-card__image">
                            <img src="${imageUrl}" alt="${product.name}" loading="lazy">
                            <button class="product-card__favorite" data-favorite="${product.isFavorite}">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="${product.isFavorite ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                                </svg>
                            </button>
                        </div>
                        <div class="product-card__content">
                            <h3 class="product-card__title">${product.name}</h3>
                            <p class="product-card__seller">出品者: ${product.seller}</p>
                            <div class="product-card__footer">
                                <span class="product-card__price">
                                    ${product.originalPrice ? `<span class="price-original">¥${product.originalPrice.toLocaleString()}</span>` : ''}
                                    ¥${product.price.toLocaleString()}
                                </span>
                                <button class="btn btn-sm btn-primary">カートに追加</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            // ページネーション表示
            displayPagination(products.length);
        }

        function displayPagination(totalItems) {
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const pagination = document.getElementById('pagination');

            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }

            let html = `
                <button class="pagination__btn ${currentPage === 1 ? 'pagination__btn--disabled' : ''}" 
                        onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                    前へ
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `
                        <button class="pagination__page ${i === currentPage ? 'pagination__page--active' : ''}" 
                                onclick="changePage(${i})">
                            ${i}
                        </button>
                    `;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += '<span style="padding: 0.5rem;">...</span>';
                }
            }

            html += `
                <button class="pagination__btn ${currentPage === totalPages ? 'pagination__btn--disabled' : ''}" 
                        onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}>
                    次へ
                </button>
            `;

            pagination.innerHTML = html;
        }

        function changePage(page) {
            currentPage = page;
            displayProducts();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // カテゴリータブ
        document.querySelectorAll('.category-tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.category-tab').forEach(t => {
                    t.classList.remove('active');
                    t.classList.remove('btn-primary');
                    t.classList.add('btn-outline');
                });
                
                this.classList.add('active');
                this.classList.remove('btn-outline');
                this.classList.add('btn-primary');
                
                currentCategory = this.dataset.category;
                currentPage = 1;
                displayProducts();
            });
        });

        // 初期表示
        document.addEventListener('DOMContentLoaded', function() {
            displayProducts();
        });
    </script>
</body>
</html>
